<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TikTok Video Free Liker | Dasun Kalhara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glass-card">
  <div class="content">
    <div class="logo-area">
      <div class="tiktok-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 1.18.24V9.27a6.3 6.3 0 0 0-1.19-.1A6.3 6.3 0 0 0 5.06 15.3a6.29 6.29 0 0 0 10.18 4.63 6.29 6.29 0 0 0 2.19-4.7V9.21a7.76 7.76 0 0 0 4.22 1.28V7.25a4.84 4.84 0 0 1-2.06-.56z" fill="white"/>
        </svg>
      </div>
      <h1>TikTok Free Liker</h1>
    </div>
    <div style="text-align: center;">
      <div class="sub">✦ Boost engagement instantly ✦</div>
    </div>

    <div class="input-group">
      <input type="url" id="videoLink" placeholder="https://www.tiktok.com/@user/video/123456789" autocomplete="off">
    </div>

    <div class="action-row">
      <div class="select-label">📊 What to increase?</div>
      <select id="boostType">
        <option value="likes">❤️ Likes</option>
        <option value="views">👁️ Views</option>
      </select>
    </div>

    <button class="send-btn" id="sendBoostBtn">
      <span>🚀</span> Send Boost
    </button>

    <div class="result-panel" id="resultPanel" style="display: none;">
      <div class="result-message" id="resultMessage"></div>
    </div>
    <div class="info-tip">
      <span>🔗 paste any TikTok video link</span>
      <span>⚡ free & unlimited (demo)</span>
    </div>
  </div>
  <div class="footer">
    Created By <strong>Dasun Kalhara</strong> ✨
  </div>
</div>

<script src="script.js"></script>
</body>
            </html>
